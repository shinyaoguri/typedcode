name: Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 構成:
#   test                   — どのトリガでも必ず走る (tsc + テスト)
#   deploy-preview         — PR で Pages のプレビュー URL を発行 (Workers staging 向け)
#   deploy-staging         — develop push で Workers staging + Pages staging を更新
#   deploy-production      — main  push で Workers production + Pages production を更新
#                            (GitHub Environment "production" の Required reviewers で承認待ち)
#
# 設計判断:
#   - 本番は手動承認ゲート前提。develop で動作確認 → main マージ → 承認 → 本番。
#   - Pages の Cloudflare バンドルは VITE_API_URL が baked-in なので、
#     ターゲットごとに build を回す (staging build と production build が別物)。

jobs:
  # --------------------------------------------------------------------
  # 共通テスト
  # --------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Run tests (shared)
        run: npm run test:run -w @typedcode/shared

      - name: Run tests (workers)
        run: npm run test:run -w @typedcode/workers

  # --------------------------------------------------------------------
  # PR: Pages プレビューデプロイ (Workers は触らない)
  # PR ビルドは staging API を指す。
  # --------------------------------------------------------------------
  deploy-preview:
    needs: test
    # head_ref != 'develop' で `develop → main` の PR (= PR #60 など) を除外する。
    # この種類の PR では develop push 起因の deploy-staging が `develop.<project>.pages.dev`
    # にデプロイするのと URL が衝突するため、PR 側の preview は走らせない。
    # 通常の feature/* → develop PR では head_ref が feature 名になるので衝突しない。
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' && github.head_ref != 'develop'
    runs-on: ubuntu-latest
    environment:
      name: staging
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build (staging API)
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Merge build outputs
        run: |
          mkdir -p ./dist
          cp -r ./packages/editor/dist/* ./dist/
          cp -r ./packages/verify/dist ./dist/verify

      - name: Deploy to Cloudflare Pages (Preview)
        id: preview-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }} --branch=${{ github.head_ref }}

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.preview-deploy.outputs.command-output }}`;
            const urlMatch = output.match(/https:\/\/[^\s]+\.pages\.dev/);
            const previewUrl = urlMatch ? urlMatch[0] : null;

            if (!previewUrl) {
              console.log('Could not extract preview URL from output:', output);
              return;
            }

            const body = `## 🚀 Preview Deployment

            | Name | URL |
            |------|-----|
            | Preview | ${previewUrl} |

            *Deployed from commit ${context.sha.substring(0, 7)}*
            *API: staging Workers*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('## 🚀 Preview Deployment')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  # --------------------------------------------------------------------
  # develop push: staging 環境 (Workers + Pages) を更新
  # 自動デプロイ。承認ゲートなし。
  # --------------------------------------------------------------------
  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: staging
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build (staging API)
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Merge build outputs
        run: |
          mkdir -p ./dist
          cp -r ./packages/editor/dist/* ./dist/
          cp -r ./packages/verify/dist ./dist/verify

      - name: Deploy Workers (Staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/workers
          command: deploy --config wrangler.staging.toml

      - name: Deploy to Cloudflare Pages (Staging)
        # --branch=develop で develop.<project>.pages.dev という stable URL になる
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }} --branch=develop

  # --------------------------------------------------------------------
  # main push: production 環境 (Workers + Pages) を更新
  # GitHub Environment "production" の Required reviewers で承認待ち。
  # --------------------------------------------------------------------
  deploy-production:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build (production API)
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Merge build outputs
        run: |
          mkdir -p ./dist
          cp -r ./packages/editor/dist/* ./dist/
          cp -r ./packages/verify/dist ./dist/verify

      - name: Deploy Workers (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/workers
          command: deploy --config wrangler.production.toml

      - name: Deploy to Cloudflare Pages (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}
