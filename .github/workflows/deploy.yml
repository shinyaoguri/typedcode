name: Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# ref ごとに 1 run。PR は新しい push で古い run をキャンセル (CI 節約)。
# push (= deploy) はキャンセルせずキューイングし、最新 run が最後に走るので
# 「古い deploy が後から完了して新しい成果物を上書きする」競合を防ぐ。
# 本番デプロイを途中キャンセルしないため cancel-in-progress は PR のみ true。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# 構成:
#   test                   — どのトリガでも必ず走る (shared / workers のユニットテスト)
#   check                  — どのトリガでも必ず走る (全 package typecheck/build + Worker config dry-run)
#   deploy-preview         — feature → develop PR で Pages のプレビュー URL を発行 (Workers staging 向け)
#   comment-staging-preview— develop → main PR に staging URL をコメント (新規 preview は作らない)
#   deploy-staging         — develop push で Workers staging + Pages staging を更新
#   deploy-production      — main  push で Workers production + Pages production を更新
#                            (GitHub Environment "production" の Required reviewers で承認待ち)
#
# 設計判断:
#   - 本番は手動承認ゲート前提。develop で動作確認 → main マージ → 承認 → 本番。
#   - Pages の Cloudflare バンドルは VITE_API_URL が baked-in なので、
#     ターゲットごとに build を回す (staging build と production build が別物)。

jobs:
  # --------------------------------------------------------------------
  # 共通テスト
  # --------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Run tests (shared)
        run: npm run test:run -w @typedcode/shared

      - name: Run tests (workers)
        run: npm run test:run -w @typedcode/workers

  # --------------------------------------------------------------------
  # 品質ゲート (merge 前に全 package を typecheck/build + Worker config 検証)
  # build は従来 deploy job で初めて走っていたため、main/develop に入ってから
  # 失敗する余地があった。push/PR どちらでも走らせ deploy の前提条件にする。
  # secrets 不要 (VITE_* 無しでも build は通る / wrangler は --dry-run)。
  # --------------------------------------------------------------------
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Typecheck (all packages)
        run: npm run typecheck

      - name: Build (all packages)
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Validate Worker config (staging dry-run)
        run: npm run deploy:staging -w @typedcode/workers -- --dry-run --outdir /tmp/wrangler-dryrun-staging

      - name: Validate Worker config (production dry-run)
        run: npm run deploy:production -w @typedcode/workers -- --dry-run --outdir /tmp/wrangler-dryrun-production

  # --------------------------------------------------------------------
  # PR: Pages プレビューデプロイ (Workers は触らない)
  # PR ビルドは staging API を指す。
  # --------------------------------------------------------------------
  deploy-preview:
    needs: [test, check]
    # head_ref != 'develop' で `develop → main` の PR (= PR #60 など) を除外する。
    # この種類の PR では develop push 起因の deploy-staging が `develop.<project>.pages.dev`
    # にデプロイするのと URL が衝突するため、PR 側の preview は走らせない。
    # 通常の feature/* → develop PR では head_ref が feature 名になるので衝突しない。
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' && github.head_ref != 'develop'
    runs-on: ubuntu-latest
    environment:
      name: staging
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build (staging API)
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Merge build outputs
        run: |
          mkdir -p ./dist
          cp -r ./packages/editor/dist/* ./dist/
          cp -r ./packages/verify/dist ./dist/verify

      - name: Deploy to Cloudflare Pages (Preview)
        id: preview-deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --commit-message を明示的に ASCII で渡す。CF Pages API は非 ASCII
          # コミットメッセージを 8000111 で拒否することがあるため (wrangler issue)、
          # SHA を message として送って追跡性を保つ。
          command: pages deploy ./dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }} --branch=${{ github.head_ref }} --commit-hash=${{ github.sha }} --commit-message="${{ github.sha }}"

      - name: Comment PR with preview URL
        uses: actions/github-script@v9
        with:
          script: |
            const output = `${{ steps.preview-deploy.outputs.command-output }}`;
            const urlMatch = output.match(/https:\/\/[^\s]+\.pages\.dev/);
            const previewUrl = urlMatch ? urlMatch[0] : null;

            if (!previewUrl) {
              console.log('Could not extract preview URL from output:', output);
              return;
            }

            const body = `## 🚀 Preview Deployment

            | Name | URL |
            |------|-----|
            | Preview | ${previewUrl} |

            *Deployed from commit ${context.sha.substring(0, 7)}*
            *API: staging Workers*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('## 🚀 Preview Deployment')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  # --------------------------------------------------------------------
  # develop → main PR: 新規プレビューは作らない (develop push の deploy-staging が
  # develop.<project>.pages.dev に出すのと URL が衝突するため)。代わりに、その
  # staging URL を PR にコメントする。本番昇格前に確認すべき成果物がこれ。
  # --------------------------------------------------------------------
  comment-staging-preview:
    needs: [test, check]
    if: github.event_name == 'pull_request' && github.head_ref == 'develop' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment staging preview URL on the PR
        uses: actions/github-script@v9
        env:
          PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
        with:
          script: |
            const url = `https://develop.${process.env.PROJECT_NAME}.pages.dev`;
            const marker = '## 🔍 Staging Preview (develop → main)';
            const body = `${marker}

            | Name | URL |
            |------|-----|
            | Staging | ${url} |

            この PR は develop を main に昇格します。develop の最新ビルドは常時この staging URL にデプロイされています (API: **staging** Workers)。本番デプロイ前の動作確認はここで行ってください。
            *Promotion candidate: ${context.sha.substring(0, 7)}*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # --------------------------------------------------------------------
  # develop push: staging 環境 (Workers + Pages) を更新
  # 自動デプロイ。承認ゲートなし。
  # --------------------------------------------------------------------
  deploy-staging:
    needs: [test, check]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: staging
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build (staging API)
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Merge build outputs
        run: |
          mkdir -p ./dist
          cp -r ./packages/editor/dist/* ./dist/
          cp -r ./packages/verify/dist ./dist/verify

      - name: Deploy Workers (Staging)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/workers
          command: deploy --config wrangler.staging.toml

      - name: Deploy to Cloudflare Pages (Staging)
        # --branch=develop で develop.<project>.pages.dev という stable URL になる
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }} --branch=develop --commit-hash=${{ github.sha }} --commit-message="${{ github.sha }}"

  # --------------------------------------------------------------------
  # main push: production 環境 (Workers + Pages) を更新
  # GitHub Environment "production" の Required reviewers で承認待ち。
  # --------------------------------------------------------------------
  deploy-production:
    needs: [test, check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build (production API)
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Merge build outputs
        run: |
          mkdir -p ./dist
          cp -r ./packages/editor/dist/* ./dist/
          cp -r ./packages/verify/dist ./dist/verify

      - name: Deploy Workers (Production)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/workers
          command: deploy --config wrangler.production.toml

      - name: Deploy to Cloudflare Pages (Production)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }} --commit-hash=${{ github.sha }} --commit-message="${{ github.sha }}"
