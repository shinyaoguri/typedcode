name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        # --include=optional は npm の optional-deps バグの回避策。
        # rolldown のような platform-specific native binding (linux-x64-gnu 等) を
        # 確実に解決させるために必要。--frozen-lockfile は npm では未対応なので削除。
        run: npm ci --include=optional

      - name: Run tests (shared)
        # shared の暗号証明エンジンと型バリデータ。
        run: npm run test:run -w @typedcode/shared

      - name: Run tests (workers)
        # Workers のチェックポイント署名ハンドラ (冪等性 / NON_MONOTONIC / 鍵未設定 等)。
        run: npm run test:run -w @typedcode/workers

      - name: Build project
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Merge build outputs
        run: |
          mkdir -p ./dist
          cp -r ./packages/editor/dist/* ./dist/
          cp -r ./packages/verify/dist ./dist/verify

      - name: Configure production wrangler.toml
        # 本番 KV ID を secrets から差し込む。HEAD の wrangler.toml は placeholder
        # (REPLACE_WITH_PRODUCTION_ID 等) で公開されているため、デプロイ前に置換する。
        # 必要な secrets:
        #   - CLOUDFLARE_KV_PRODUCTION_ID  (本番 KV ネームスペース ID)
        #   - CLOUDFLARE_KV_PREVIEW_ID     (preview KV ネームスペース ID)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          sed -i "s|REPLACE_WITH_PRODUCTION_ID|${{ secrets.CLOUDFLARE_KV_PRODUCTION_ID }}|g" packages/workers/wrangler.toml
          sed -i "s|REPLACE_WITH_PREVIEW_ID|${{ secrets.CLOUDFLARE_KV_PREVIEW_ID }}|g" packages/workers/wrangler.toml

      - name: Deploy Workers (Production)
        # Worker のみデプロイ。Pages とは別エンドポイント (api.typedcode.dev 等) で動作。
        # シークレット (TURNSTILE_SECRET_KEY, ATTESTATION_SECRET_KEY,
        # CHECKPOINT_SIGNING_KEY_*) は `wrangler secret put` で別途事前設定が必要。
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/workers
          command: deploy --env production

      - name: Deploy to Cloudflare Pages (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}

      - name: Deploy to Cloudflare Pages (Preview)
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        id: preview-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }} --branch=${{ github.head_ref }}

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.preview-deploy.outputs.command-output }}`;
            const urlMatch = output.match(/https:\/\/[^\s]+\.pages\.dev/);
            const previewUrl = urlMatch ? urlMatch[0] : null;

            if (!previewUrl) {
              console.log('Could not extract preview URL from output:', output);
              return;
            }

            const body = `## 🚀 Preview Deployment

            | Name | URL |
            |------|-----|
            | Preview | ${previewUrl} |

            *Deployed from commit ${context.sha.substring(0, 7)}*`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('## 🚀 Preview Deployment')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
