name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# ref ごとに 1 run。PR は新しい push で古い run をキャンセル (CI 節約)。
# push (= deploy) はキャンセルせずキューイングし、最新 run が最後に走るので
# 「古い deploy が後から完了して新しい成果物を上書きする」競合を防ぐ。
# 本番デプロイを途中キャンセルしないため cancel-in-progress は PR のみ true。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# 構成 (タグ式 GitHub Flow, ADR-0028):
#   test                   — どのトリガでも必ず走る (test:run を持つ全 workspace のユニットテスト)
#   check                  — どのトリガでも必ず走る (全 package typecheck/build + Worker config dry-run)
#   deploy-preview         — feature → main PR で Pages のプレビュー URL を発行 (Workers staging 向け)
#   deploy-staging         — main push で Workers staging + Pages staging (--branch=staging) を更新
#   deploy-production      — v* タグ push で Workers production + Pages production を更新
#                            (GitHub Environment "production" の Required reviewers で承認待ち)
#
# 設計判断:
#   - 本番は手動承認ゲート前提。main = staging で動作確認 → v* タグ (gh release create) → 承認 → 本番。
#   - タグ push でも test/check/e2e を再実行する (リリースゲート)。タグは CI 未通過の
#     コミットにも打ててしまうため、タグ時の再検証が唯一の強制ゲートになる。
#   - Pages の Cloudflare バンドルは VITE_API_URL が baked-in なので、
#     ターゲットごとに build を回す (staging build と production build が別物)。

jobs:
  # --------------------------------------------------------------------
  # 共通テスト
  # --------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      # `test:run` script を持つ全 workspace を回す (#156)。パッケージ名の個別列挙だと
      # 新パッケージのテストが CI 外に取り残される (editor がそうなっていた)。
      # e2e は `test` のみで `test:run` を持たないため誤って拾わない。
      - name: Run unit tests (all workspaces with test:run)
        run: npm run test:run --workspaces --if-present

  # --------------------------------------------------------------------
  # 品質ゲート (merge 前に全 package を typecheck/build + Worker config 検証)
  # build は従来 deploy job で初めて走っていたため、main に入ってから
  # 失敗する余地があった。push/PR どちらでも走らせ deploy の前提条件にする。
  # secrets 不要 (VITE_* 無しでも build は通る / wrangler は --dry-run)。
  # --------------------------------------------------------------------
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Typecheck (all packages)
        run: npm run typecheck

      - name: Lint & format check (Biome)
        run: npm run lint

      - name: Build (all packages)
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Validate Worker config (staging dry-run)
        run: npm run deploy:staging -w @typedcode/workers -- --dry-run --outdir /tmp/wrangler-dryrun-staging

      - name: Validate Worker config (production dry-run)
        run: npm run deploy:production -w @typedcode/workers -- --dry-run --outdir /tmp/wrangler-dryrun-production

  # --------------------------------------------------------------------
  # E2E (ブラウザ round-trip): 実物のエディタを動かして証明を出力し verify-cli で検証する。
  # workers(wrangler dev) + editor(vite dev) を Playwright が起動。Turnstile は
  # Cloudflare 公開テストキー、checkpoint 署名鍵は実行時に新規生成 (秘密はコミットしない)。
  # コピペ/フルスクリーン等のブラウザ依存挙動もここで自動検証していく。
  # --------------------------------------------------------------------
  e2e:
    runs-on: ubuntu-latest
    # e2e は wrangler dev + vite dev を Playwright が起動する構成でハングの余地があり、
    # 過去に PoSW full 検証でタイムアウト間際になった実績もある (a6079d0)。
    # 実測 ~7 分 (--mode fast 整合 + workers:2 後。full は happy-path のみ)。
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Provision E2E env (test keys + 生成 checkpoint 鍵)
        run: npm run setup -w @typedcode/e2e

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E (editor → export → verify-cli round-trip)
        run: npm run test -w @typedcode/e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            packages/e2e/playwright-report/
            packages/e2e/test-results/
          retention-days: 7

  # --------------------------------------------------------------------
  # PR: Pages プレビューデプロイ (Workers は触らない)
  # PR ビルドは staging API を指す。
  # --------------------------------------------------------------------
  deploy-preview:
    needs: [test, check, e2e]
    # head_ref != 'staging' で `staging` という名前のブランチを除外する。
    # deploy-staging が --branch=staging で `staging.<project>.pages.dev` にデプロイ
    # するため、同名 head の PR preview が走ると URL が衝突して staging を上書きする。
    # (`staging` はブランチ名として予約。CONTRIBUTING.md 参照)
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' && github.head_ref != 'staging'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: staging
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build (staging API)
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Merge build outputs
        run: |
          mkdir -p ./dist
          cp -r ./packages/editor/dist/* ./dist/
          cp -r ./packages/verify/dist ./dist/verify

      - name: Deploy to Cloudflare Pages (Preview)
        id: preview-deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --commit-message を明示的に ASCII で渡す。CF Pages API は非 ASCII
          # コミットメッセージを 8000111 で拒否することがあるため (wrangler issue)、
          # SHA を message として送って追跡性を保つ。
          command: pages deploy ./dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }} --branch=${{ github.head_ref }} --commit-hash=${{ github.sha }} --commit-message="${{ github.sha }}"

      - name: Comment PR with preview URL
        uses: actions/github-script@v9
        with:
          script: |
            const output = `${{ steps.preview-deploy.outputs.command-output }}`;
            const urlMatch = output.match(/https:\/\/[^\s]+\.pages\.dev/);
            const previewUrl = urlMatch ? urlMatch[0] : null;

            if (!previewUrl) {
              console.log('Could not extract preview URL from output:', output);
              return;
            }

            const body = `## 🚀 Preview Deployment

            | Name | URL |
            |------|-----|
            | Preview | ${previewUrl} |

            *Deployed from commit ${context.sha.substring(0, 7)}*
            *API: staging Workers*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('## 🚀 Preview Deployment')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  # --------------------------------------------------------------------
  # main push: staging 環境 (Workers + Pages) を更新
  # 自動デプロイ。承認ゲートなし。main = 常時統合ブランチ (ADR-0028)。
  # --------------------------------------------------------------------
  deploy-staging:
    needs: [test, check, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: staging
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build (staging API)
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Merge build outputs
        run: |
          mkdir -p ./dist
          cp -r ./packages/editor/dist/* ./dist/
          cp -r ./packages/verify/dist ./dist/verify

      - name: Deploy Workers (Staging)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/workers
          command: deploy --config wrangler.staging.toml

      - name: Deploy to Cloudflare Pages (Staging)
        # --branch=staging で staging.<project>.pages.dev という stable URL になる。
        # --branch=main は Pages プロジェクトの production branch と衝突する
        # (production デプロイ扱いになる) ため使わない。
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }} --branch=staging --commit-hash=${{ github.sha }} --commit-message="${{ github.sha }}"

  # --------------------------------------------------------------------
  # v* タグ push: production 環境 (Workers + Pages) を更新
  # リリース = `gh release create vX.Y.Z` によるタグ作成 (CONTRIBUTING.md 参照)。
  # GitHub Environment "production" の Required reviewers で承認待ち。
  # --------------------------------------------------------------------
  deploy-production:
    needs: [test, check, e2e]
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    runs-on: ubuntu-latest
    # 注: Environment "production" の承認待ち時間は timeout-minutes に含まれない
    # (job 開始 = 承認後)。実行時間のみの上限。
    timeout-minutes: 20
    environment:
      name: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
          # ancestor ガード (下) が main との祖先関係を辿るため全履歴を取得する
          fetch-depth: 0

      # タグは任意のコミットに打てるため、main の履歴上のコミットであることを検証する。
      # main に載っていないコミットへのタグでは本番デプロイを拒否する。
      - name: Verify tag commit is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build (production API)
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Merge build outputs
        run: |
          mkdir -p ./dist
          cp -r ./packages/editor/dist/* ./dist/
          cp -r ./packages/verify/dist ./dist/verify

      - name: Deploy Workers (Production)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/workers
          command: deploy --config wrangler.production.toml

      - name: Deploy to Cloudflare Pages (Production)
        # --branch=main (= Pages プロジェクトの production branch) を明示する。
        # タグ checkout は detached HEAD になり branch 推定が効かないため、
        # 省略すると preview デプロイ扱いになって本番 URL が更新されない。
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }} --branch=main --commit-hash=${{ github.sha }} --commit-message="${{ github.sha }}"
