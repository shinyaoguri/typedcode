# 本番環境用 Wrangler 設定。
#
# 使い方:
#   wrangler deploy --config wrangler.production.toml
#
# CI からは main ブランチ push 時にデプロイされるが、
# GitHub Environment "production" の Required reviewers により承認待ちになる
# (.github/workflows/deploy.yml の deploy-production ジョブ)。
#
# KV namespace ID はシークレットではない (Cloudflare API token なしでは
# アクセス不能) ため、直接 commit している。新しい production KV を
# 切り直す場合はこのファイルを編集して PR を出す。
#
# Worker のシークレット (TURNSTILE_SECRET_KEY, ATTESTATION_SECRET_KEY,
# CHECKPOINT_SIGNING_KEY_*) は `wrangler secret put --config wrangler.production.toml`
# で production Worker に直接投入する。

name = "typedcode-api"
main = "src/index.ts"
compatibility_date = "2025-12-26"

# Workers Logs を有効化 (運用時の観測性)。head_sampling_rate=1 は低トラフィックな
# 署名 API 向けに全リクエストを記録する。トラフィックが増えたら下げる。
[observability]
enabled = true
head_sampling_rate = 1

[vars]
ENVIRONMENT = "production"
# CORS 許可オリジン (カンマ区切り)。editor / verify は同一 Pages プロジェクト
# (editor=/, verify=/verify) なので origin は 1 つ。カスタムドメインと既定の
# pages.dev の両方を許可する。シークレットではない公開ドメインなので直接 commit してよい。
ALLOWED_ORIGINS = "https://typedcode.dev,https://typedcode.pages.dev"

# 必須シークレットを宣言 (wrangler secret put で投入)。未設定のままデプロイすると
# wrangler が deploy 時にエラーにするので、設定漏れによる本番事故を防げる。
[secrets]
required = [
  "TURNSTILE_SECRET_KEY",
  "ATTESTATION_SECRET_KEY",
  "CHECKPOINT_SIGNING_KEY_ID",
  "CHECKPOINT_SIGNING_KEY_JWK",
]

[[kv_namespaces]]
binding = "CHECKPOINT_SESSIONS"
id = "dbc5d23dd68442379d5ed613494ede6a"
