# 本番環境用 Wrangler 設定。
#
# 使い方:
#   wrangler deploy --config wrangler.production.toml
#
# CI からは main ブランチ push 時にデプロイされるが、
# GitHub Environment "production" の Required reviewers により承認待ちになる
# (.github/workflows/deploy.yml の deploy-production ジョブ)。
#
# KV ID は CI で sed 置換される:
#   REPLACE_WITH_PRODUCTION_ID  ← secrets.CLOUDFLARE_KV_PRODUCTION_ID
#
# シークレット (TURNSTILE_SECRET_KEY, ATTESTATION_SECRET_KEY,
# CHECKPOINT_SIGNING_KEY_*) は事前に `wrangler secret put ...` で本番に設定すること。

name = "typedcode-api"
main = "src/index.ts"
compatibility_date = "2025-12-26"

[vars]
ENVIRONMENT = "production"

[[kv_namespaces]]
binding = "CHECKPOINT_SESSIONS"
id = "REPLACE_WITH_PRODUCTION_ID"
