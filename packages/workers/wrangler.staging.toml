# Staging 環境用 Wrangler 設定。
#
# 使い方:
#   wrangler deploy --config wrangler.staging.toml
#
# CI からは develop ブランチ push 時に自動デプロイされる
# (.github/workflows/deploy.yml の deploy-staging ジョブ)。
#
# KV namespace ID はシークレットではない (Cloudflare API token なしでは
# アクセス不能) ため、直接 commit している。新しい staging KV を切り直す
# 場合はこのファイルを編集して PR を出す。
#
# Worker のシークレット (TURNSTILE_SECRET_KEY, ATTESTATION_SECRET_KEY,
# CHECKPOINT_SIGNING_KEY_*) は `wrangler secret put --config wrangler.staging.toml`
# で staging Worker に直接投入する。

name = "typedcode-api-staging"
main = "src/index.ts"
compatibility_date = "2025-12-26"

# Workers Logs を有効化 (運用時の観測性)。head_sampling_rate=1 で全リクエスト記録。
[observability]
enabled = true
head_sampling_rate = 1

[vars]
ENVIRONMENT = "staging"
# CORS 許可オリジン。staging Worker は develop デプロイ (develop.typedcode.pages.dev)
# だけでなく PR プレビュー (<branch>.typedcode.pages.dev) からも叩かれる。
# サブドメイン wildcard で自プロジェクト配下の pages.dev を許可する
# (*.pages.dev のように広げないこと: 自プロジェクトの branch alias に限定される)。
ALLOWED_ORIGINS = "https://*.typedcode.pages.dev"

# 必須シークレット宣言 (wrangler secret put で投入)。未設定だと deploy 時にエラー。
[secrets]
required = [
  "TURNSTILE_SECRET_KEY",
  "ATTESTATION_SECRET_KEY",
  "CHECKPOINT_SIGNING_KEY_ID",
  "CHECKPOINT_SIGNING_KEY_JWK",
]

[[kv_namespaces]]
binding = "CHECKPOINT_SESSIONS"
id = "712009e2e71949ebb7cc24ed77dfa5d1"
